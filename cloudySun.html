<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>cloudy</title>
</head>
<style>
	body{
		display: flex;
		justify-content: center;
		align-items: center;
		background-color: skyblue;
		height: 100vh;	
	}
	.clound-center{
		width: 200px;
		height: 50px;
		background-color: #fff;
		border-radius: 30px;
		position: relative;
	}
	.clound-center::before{
		content: '';
		position: absolute;
		width: 100px;
		height: 100px;
		border-radius: 50px;
		z-index: 1;
		background-color: #fff;
		bottom: 15px;
		left: 10px;
	}
	.clound-center::after{
		content: '';
		position: absolute;
		width: 100px;
		height: 100px;
		border-radius: 50px;
		z-index: 1;
		background-color: #fff;
		bottom: 25px;
		left: 85px;
	}
	.sun{
		width: 75px;
		height: 75px;
		background-color: yellow;
		border-radius: 50px;
		position: relative;
		bottom: 70px;
		right: 45px;
		animation-name: sunglow;
		animation-duration: 20s;
		animation-iteration-count: infinite;
		animation-timing-function: linear;

	}
	@keyframes sunglow{
		0%,100%{
			box-shadow: 0px 0px 10px 10px lightyellow;
		}
		50%{
			box-shadow: 0px 0px 10px 10px #F7C77E;
		}
	}
	
	


</style>
<body>

	<div class="clound-center">
		
	</div>
	<div class="sun">
		
	</div>

</body>
</html>
