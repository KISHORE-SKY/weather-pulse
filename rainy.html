<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>rain</title>
</head>
	
	<style>
		body{
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
			background-color: skyblue;
		}
		.cloud{
			width: 200px;
			height: 50px;
			background-color: lightgray;
			border-radius: 30px;
			position: relative;
			animation: lightning 2.0s ease infinite;
			
		}

		.cloud::before{
			content: '';
			position: absolute;
			width: 100px;
			height: 100px;
			border-radius: 50px;
			z-index: 1;
			background-color: lightgray;
			bottom: 15px;
			left: 10px;
			animation: lightning 2.0s ease infinite;
			
	}
		.cloud::after{
			content: '';
			position: absolute;
			width: 100px;
			height: 100px;
			border-radius: 50px;
			z-index: 1;
			background-color: lightgray;
			bottom: 25px;
			left: 85px;
			animation: lightning 2.0s ease infinite;
			
		}

		@keyframes lightning{
			90%{
				background-color: #F5F5F5;
			}
			100%{
				background-color: #fff;
			}
		}

		.rain-drops{
			display: flex;
			position: relative;
			bottom: 10px;
		}
		.rain-drops span{
			width: 5px;
			height: 8px;
			margin: 5px;
			background-color: #4fa3e3;
			border-radius: 20px;
			animation: rainfall 3s linear infinite ;
			
		}
		@keyframes rainfall{
			100%{		
				transform: translateY(55px);
				background-color: skyblue;
			}
		}
		.rain-drops > span:nth-child(1){
			animation-delay: 0.2s;
		}
		.rain-drops > span:nth-child(2){
			animation-delay: 2.1s;
		}
		.rain-drops > span:nth-child(3){
			animation-delay: 0.7s;
		}
		.rain-drops > span:nth-child(4){
			animation-delay: 1.4s;
		}
		.rain-drops > span:nth-child(5){
			animation-delay: 2.4s;
		}
		.rain-drops > span:nth-child(7){
			animation-delay: 1.9s;
		}
		.rain-drops > span:nth-child(8){
			animation-delay: 0.9s;
		}
		.rain-drops>span:nth-child(10){
			animation-delay: 0.5s;
		}


	</style>
<body>
	<div class="cloud"></div>

	<div class="rain-drops">
	<span></span>
	<span></span>
	<span></span>	
	<span></span>
	<span></span>
	<span></span>
	<span></span>
	<span></span>
	<span></span>
	<span></span>
	</div>

</html>
