<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>snow</title>
</head>
<head>
	
	<style>
		body{
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
			background-color: skyblue;
		}
		.cloud{
			width: 200px;
			height: 50px;
			background-color: #fff;
			border-radius: 30px;
			position: relative;
		}

		.cloud::before{
			content: '';
			position: absolute;
			width: 100px;
			height: 100px;
			border-radius: 50px;
			z-index: 1;
			background-color: #fff;
			bottom: 15px;
			left: 10px;
	}
		.cloud::after{
			content: '';
			position: absolute;
			width: 100px;
			height: 100px;
			border-radius: 50px;
			z-index: 1;
			background-color: #fff;
			bottom: 25px;
			left: 85px;
		}
		.snow-drops{
			display: flex;
			position: relative;
			bottom: 10px;
		}
		.snow-drops span{
			width: 15px;
			height: 15px;
			margin: 5px;
			background-color: #fff;
			border-radius: 10px;
			animation: snowfall 3s linear infinite ;
			display: inline;
		}
		@keyframes snowfall{
			100%{		
				transform: translateY(45px);
				background-color: skyblue;
			}
		}
		.snow-drops > span:nth-child(1){
			animation-delay: 0.4s;
		}
		.snow-drops > span:nth-child(2){
			animation-delay: 2.1s;
		}
		.snow-drops > span:nth-child(3){
			animation-delay: 3.0s;
		}
		.snow-drops > span:nth-child(4){
			animation-delay: 1.4s;
		}
		.snow-drops > span:nth-child(5){
			animation-delay: 2.4s;
		}
		.snow-drops > span:nth-child(6){
			animation-delay: 1s;
		}
		.snow-drops > span:nth-child(7){
			animation-delay: 1.9s;
		}
		.snow-drops > span:nth-child(8){
			animation-delay: 0.9s;
		}


	</style>
		
</head>
<body>
	<div class="cloud"></div>
	<div class="snow-drops">
	<span></span>
	<span></span>
	<span></span>	
	<span></span>
	<span></span>
	<span></span>
	<span></span>
	<span></span>
	</div>

<script>
	
</script>
</html>
